services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: courier
      POSTGRES_PASSWORD: courier_pass
      POSTGRES_DB: courier_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
